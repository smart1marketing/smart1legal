services:
  - type: web
    name: smart1legal
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SMART1_WEBHOOK_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ENABLE_PDF
        value: "1"
